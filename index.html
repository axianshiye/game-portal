<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>我的游戏厅</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <header class="top">
      <div>
        <p class="eyebrow">AXIANSHIYE GAMES</p>
        <h1>我的游戏厅</h1>
      </div>
      <span class="status">Public</span>
    </header>

    <section class="feature" aria-label="精选游戏">
      <div class="feature-copy">
        <span class="tag">最新更新</span>
        <h2>怪物刷子</h2>
        <p>完整素材已经上传到 GitHub，线上版体积较大，正在单独整理更适合手机加载的版本。</p>
      </div>
      <span class="play disabled">整理中</span>
    </section>

    <section class="grid" aria-label="游戏列表">
      <article class="card startup">
        <div>
          <span class="label">经营模拟</span>
          <h2>创业模拟器</h2>
          <p>像素城市、选址开店、资金成长。</p>
        </div>
        <a class="play" href="games/startup-sim/index.html">进入</a>
      </article>

      <article class="card match">
        <div>
          <span class="label">休闲消除</span>
          <h2>天天消消乐</h2>
          <p>甜点棋子、道具和连消节奏。</p>
        </div>
        <a class="play" href="games/tiantian-match3/index.html">进入</a>
      </article>

      <article class="card thunder">
        <div>
          <span class="label">弹幕射击</span>
          <h2>雷电战机</h2>
          <p>风暴背景、战机火力和弹幕敌人。</p>
        </div>
        <a class="play" href="games/raiden-thunder/index.html">进入</a>
      </article>

      <article class="card progress">
        <div>
          <span class="label">剧情养成</span>
          <h2>恋爱养成</h2>
          <p>素材已保留，游戏入口待整理。</p>
        </div>
        <span class="pending">制作中</span>
      </article>
    </section>
  </main>
</body>
</html>
