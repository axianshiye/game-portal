<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="screen-orientation" content="portrait" />
    <meta name="x5-orientation" content="portrait" />
    <meta name="theme-color" content="#fff1f7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="甜甜三消" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>甜甜三消</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="assets/app-icons/icon-180.png" />
    <link rel="icon" sizes="192x192" href="assets/app-icons/icon-192.png" />
    <link rel="stylesheet" href="styles.css?v=0.14.0" />
  </head>
  <body>
    <div id="loadingScreen" class="loading-screen" role="status" aria-live="polite">
      <div class="loading-card">
        <div class="loader-mascot-wrap">
          <img id="loaderMascot" class="loader-mascot" src="assets/mascot/cheer.png" alt="正在跑步的卡皮巴拉" />
        </div>
        <div class="loader-copy">
          <strong>甜点准备中</strong>
          <span id="loadingText">卡皮巴拉正在冲向厨房</span>
        </div>
        <div class="loader-track" aria-label="加载进度">
          <div id="loaderFill" class="loader-fill"></div>
          <span id="loaderPercent" class="loader-percent">0%</span>
        </div>
        <span id="loaderVersion" class="loader-version">v0.14.0</span>
      </div>
    </div>
    <main class="game-shell" aria-label="甜甜三消游戏">
      <section id="homeView" class="home-view">
        <header class="home-status">
          <div>
            <span>当前关卡</span>
            <strong id="homeLevel">1</strong>
          </div>
          <div>
            <span>金币</span>
            <strong id="homeCoins">0</strong>
          </div>
        </header>

        <div class="home-panels">
          <section id="readyPanel" class="home-panel ready-panel">
            <div class="ready-copy">
              <span>今日出战</span>
              <strong id="readyPetName">卡皮巴拉</strong>
              <small id="readyLevelText">准备挑战第 1 关</small>
            </div>
            <div class="ready-stage">
              <img id="readyPetImg" src="assets/pets/capybara-ready-hd.png" alt="准备出战的宠物" />
              <div class="home-basket-wrap">
                <img id="homeBasketImg" class="home-basket" src="assets/baskets/basket-0.png" alt="食物篮子" />
                <small id="homeFreshnessText">保鲜 70 分钟</small>
              </div>
            </div>
            <button id="startGameBtn" class="start-game-btn" type="button">开始游戏</button>
          </section>

          <section id="shopPanel" class="home-panel" hidden>
            <div class="drawer-head">
              <strong>宠物商店</strong>
              <span id="coinTextShop">金币 0</span>
            </div>
            <div id="petShop" class="pet-grid"></div>
          </section>

          <section id="profilePanel" class="home-panel" hidden>
            <div class="drawer-head">
              <strong>我的</strong>
              <span id="coinTextProfile">金币 0</span>
            </div>
            <div class="login-box">
              <input id="playerNameInput" type="text" maxlength="16" placeholder="输入昵称，本地注册登录" />
              <button id="saveProfileBtn" type="button">保存账号</button>
            </div>
            <div id="profileStats" class="profile-stats"></div>
          </section>
        </div>

        <nav class="bottom-tabs" aria-label="底部导航">
          <button class="tab-btn active" type="button" data-tab="game">游戏</button>
          <button class="tab-btn" type="button" data-tab="shop">商店</button>
          <button class="tab-btn" type="button" data-tab="profile">我的</button>
        </nav>
      </section>

      <section id="gameView" class="game-view" hidden>
        <section class="top-panel game-top-panel">
          <button id="exitGameBtn" class="exit-game-btn" type="button" aria-label="退出关卡">退出</button>
          <div class="stats" aria-label="游戏状态">
            <div><span>关卡</span><strong id="level">1</strong></div>
            <div><span>分数</span><strong id="score">0</strong></div>
            <div><span>步数</span><strong id="moves">30</strong></div>
            <div><span>连击</span><strong id="combo">x1</strong></div>
          </div>
        </section>

        <section class="game-companion" aria-label="宠物状态">
          <div id="petHud" class="pet-hud">
            <div id="mascot" class="pet-stage" aria-live="polite">
              <img id="activePetImg" src="assets/pets/capybara-idle.png" alt="当前宠物" />
              <div class="pet-meter">
                <span><b id="activePetName">卡皮巴拉</b><em id="petLevelText">Lv.1</em></span>
                <strong id="petSatietyText">0/120</strong>
                <div class="mini-track" aria-label="宠物饱食度"><i id="petSatietyFill"></i></div>
                <div class="pet-xp-label"><small>经验</small><small id="petXpText">0/60</small></div>
                <div class="mini-track pet-xp-track" aria-label="宠物升级经验"><i id="petXpFill"></i></div>
              </div>
            </div>
            <div class="basket-mini">
              <img id="basketImg" src="assets/baskets/basket-0.png" alt="食物篮子" />
              <div>
                <span>食物篮</span>
                <strong id="basketText" hidden>0/63</strong>
                <small id="freshnessText">保鲜 70 分钟</small>
              </div>
            </div>
            <div class="boosters pet-boosters" aria-label="宠物技能">
              <button id="hammerBtn" class="booster" type="button">
                <img src="assets/boosters/hammer.png" alt="" />
                <span>卡皮糖锤</span>
                <strong id="hammerCount">2</strong>
              </button>
              <button id="sparkBtn" class="booster" type="button">
                <img src="assets/boosters/spark.png" alt="" />
                <span>鹦鹉星爆</span>
                <strong id="sparkCount">1</strong>
              </button>
              <button id="rowBlastBtn" class="booster" type="button">
                <img src="assets/boosters/row-blast.png" alt="" />
                <span>小猪横扫</span>
                <strong id="rowBlastCount">1</strong>
              </button>
              <button id="colBlastBtn" class="booster" type="button">
                <img src="assets/boosters/col-blast.png" alt="" />
                <span>奶牛竖扫</span>
                <strong id="colBlastCount">1</strong>
              </button>
              <button id="crossBlastBtn" class="booster" type="button">
                <img src="assets/boosters/cross-blast.png" alt="" />
                <span>奶狗十字</span>
                <strong id="crossBlastCount">1</strong>
              </button>
              <button id="addMovesBtn" class="booster" type="button">
                <img src="assets/boosters/add-moves.png" alt="" />
                <span>加餐步数</span>
                <strong id="addMovesCount">1</strong>
              </button>
            </div>
          </div>
        </section>

        <section class="play-area">
          <div class="board-wrap">
            <div id="board" class="board" aria-label="三消棋盘"></div>
            <div id="toast" class="toast" role="status" aria-live="polite"></div>
          </div>

          <aside class="side-panel">
          <div class="target-card">
            <div class="target-head">
              <span>关卡目标</span>
              <strong id="targetScore">3000</strong>
            </div>
            <div class="progress-track" aria-label="目标进度">
              <div id="progressFill" class="progress-fill"></div>
            </div>
            <div id="orders" class="orders" aria-label="收集目标"></div>
          </div>
          <div class="controls">
            <button id="hintBtn" type="button">提示</button>
            <button id="shuffleBtn" type="button">洗牌</button>
            <button id="restartBtn" type="button">重开</button>
            <button id="soundBtn" class="sound-btn" type="button" aria-pressed="true">
              <span id="soundIcon">声音开</span>
            </button>
          </div>
          </aside>
        </section>
        <div id="celebrationPopup" class="celebration-popup" hidden aria-live="polite">
          <img id="celebrationImage" src="assets/celebrations/four.png" alt="四连消" />
        </div>
      </section>
      <div id="modal" class="modal" hidden>
        <div class="modal-card">
          <span id="modalKicker">关卡完成</span>
          <strong id="modalTitle">太甜啦！</strong>
          <p id="modalText">继续下一关，挑战更高分。</p>
          <button id="nextBtn" type="button">下一关</button>
        </div>
      </div>
    </main>
    <div id="orientationLock" class="orientation-lock" aria-hidden="true">
      <div>
        <strong>请竖屏游玩</strong>
        <span>旋转手机后继续甜甜三消</span>
      </div>
    </div>
    <div id="versionBadge" class="version-badge">v0.14.0</div>

    <script src="game.js?v=0.14.0"></script>
  </body>
</html>
